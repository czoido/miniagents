name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  experiments:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv-ci
          key: venv-${{ runner.os }}-3.12-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv-ci
          .venv-ci/bin/pip install -v -r requirements.txt

      - name: Cache HF model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-bonsai-1.7b

      - name: Run debate (1 round, 1.7b)
        run: >
          .venv-ci/bin/python -m experiments.01_debate.run
          "Is Python a good language?"
          --model 1.7b
          --rounds 1
          --max-tokens 50
          --max-tokens-judge 50
