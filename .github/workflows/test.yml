name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv-ci
          key: venv-${{ runner.os }}-3.12-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv-ci
          .venv-ci/bin/pip install -v -r requirements.txt

  experiments:
    needs: setup
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      matrix:
        model: ["1.7b", "4b", "8b"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore venv
        uses: actions/cache@v4
        with:
          path: .venv-ci
          key: venv-${{ runner.os }}-3.12-${{ hashFiles('requirements.txt') }}

      - name: Cache HF model (${{ matrix.model }})
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-bonsai-${{ matrix.model }}

      - name: Run debate (${{ matrix.model }})
        run: >
          .venv-ci/bin/python -m experiments.01_debate.run
          "Is Python a good language?"
          --model ${{ matrix.model }}

      - name: Run HN digest (${{ matrix.model }})
        run: >
          .venv-ci/bin/python -m experiments.02_hn_digest.run
          --model ${{ matrix.model }}

      - name: Run exquisite corpse (${{ matrix.model }})
        run: >
          .venv-ci/bin/python -m experiments.03_exquisite_corpse.run
          --turns 4
          --model ${{ matrix.model }}

      - name: Run mini city (${{ matrix.model }})
        run: >
          .venv-ci/bin/python -m experiments.05_mini_city.run
          --setup ""
          --hours 2
          --citizens 6
          --model ${{ matrix.model }}

      - name: Run agent forge (${{ matrix.model }})
        run: >
          .venv-ci/bin/python -m experiments.04_agent_forge.run
          --auto-approve
          "Explain what a binary search algorithm is and list its pros and cons"
          --model ${{ matrix.model }}
